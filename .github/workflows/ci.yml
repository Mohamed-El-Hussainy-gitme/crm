name: CRM Cloudflare CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-cloudflare-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build Cloudflare fullstack package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      APP_URL: http://localhost:8788
      CORS_ORIGINS: http://localhost:8788
      SESSION_SECRET: ci-session-secret-change-me-32-bytes-minimum
      SESSION_COOKIE_NAME: smartcrm_session
      SESSION_MAX_AGE_SECONDS: 43200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and test Cloudflare target
        run: npm run cf:verify
