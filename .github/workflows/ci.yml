name: CRM CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, migrate, and smoke-test dev
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartcrm
          POSTGRES_PASSWORD: smartcrm
          POSTGRES_DB: smartcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartcrm -d smartcrm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      LOG_LEVEL: silent
      PORT: 4000
      DATABASE_URL: postgresql://smartcrm:smartcrm@127.0.0.1:5432/smartcrm?schema=public
      DIRECT_URL: postgresql://smartcrm:smartcrm@127.0.0.1:5432/smartcrm?schema=public
      JWT_SECRET: smartcrm-ci-secret-123456789
      APP_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: false
      SESSION_COOKIE_SECURE: false
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare env files
        run: npm run setup:env

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run db:seed

      - name: Build and run unit tests
        run: npm run local:verify

      - name: Smoke-test npm run dev
        run: npm run ci:dev-smoke
